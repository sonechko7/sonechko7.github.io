# =============================================================
# Decap CMS — КЗДО №7 «Сонечко»
# =============================================================
# НАЛАШТУВАННЯ ПЕРЕД ПУБЛІКАЦІЄЮ:
#
# 1. Замініть YOUR_USERNAME та YOUR_REPO нижче на ваші дані
#    Приклад: repo: ivanka123/sonechko
#
# 2. Створіть GitHub OAuth App:
#    → https://github.com/settings/developers → "New OAuth App"
#    → Homepage URL:    https://YOUR_USERNAME.github.io/YOUR_REPO/
#    → Callback URL:    https://YOUR_USERNAME.github.io/YOUR_REPO/admin/
#    → Скопіюйте Client ID
#
# 3. Зареєструйте репозиторій на Netlify (БЕЗКОШТОВНО, тільки
#    для OAuth — сайт залишається на GitHub Pages):
#    → https://app.netlify.com → New site from Git → вибрати репо
#    → Settings → Identity → Enable Identity
#    → Settings → Identity → Services → GitHub → Enable
#    → Скопіюйте URL сайту Netlify (напр. random-name-123.netlify.app)
#
# 4. Замініть base_url нижче на ваш Netlify URL
#
# ДЛЯ ЛОКАЛЬНОЇ РОЗРОБКИ (на своєму комп'ютері):
#    Розкоментуйте рядок: local_backend: true
#    Запустіть в окремому терміналі: npx decap-server
#    Відкрийте: http://localhost:4000/admin/
# =============================================================

backend:
  name: github
  repo: katatsu12/katatsu12.github.io
  branch: main
  base_url: https://sonechko.netlify.app
  auth_endpoint: auth

# local_backend: true   # ← Розкоментуйте для локального тестування

locale: uk

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# =============================================================
# КОЛЕКЦІЇ (що можна редагувати через адмін-панель)
# =============================================================

collections:

  # ------ НОВИНИ ------
  - name: "posts"
    label: "📰 Новини та оголошення"
    label_singular: "Новина"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: "Заголовок"
        name: "title"
        widget: "string"
        hint: "Коротко та зрозуміло. Наприклад: «Весняне свято у «Сонечку»»"

      - label: "Дата публікації"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        default: ""

      - label: "Категорія"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - { label: "Новини",       value: "новини" }
          - { label: "Оголошення",   value: "оголошення" }
          - { label: "Свята",        value: "свята" }
          - { label: "Заходи",       value: "заходи" }
          - { label: "Фотогалерея", value: "фотогалерея" }

      - label: "Іконка (emoji)"
        name: "icon"
        widget: "string"
        required: false
        default: "📰"
        hint: "Emoji-іконка для картки новини. Наприклад: 🌸 📋 🎉 📸"

      - label: "Головне фото"
        name: "image"
        widget: "image"
        required: false
        hint: "Фото для картки новини (рекомендований розмір: 800×500 px)"

      - label: "Короткий опис (для картки на головній)"
        name: "excerpt"
        widget: "string"
        required: false
        hint: "1–2 речення. Якщо не заповнити — береться початок тексту автоматично"

      - label: "Текст новини"
        name: "body"
        widget: "markdown"

  # ------ СТОРІНКИ ------
  - name: "pages"
    label: "📄 Сторінки сайту"
    label_singular: "Сторінка"
    editor:
      preview: false
    files:

      - label: "Про заклад"
        name: "pro-zaklad"
        file: "pages/pro-zaklad.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Освітній процес"
        name: "osvitny-protses"
        file: "pages/osvitny-protses.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Наш колектив"
        name: "nash-kolektyv"
        file: "pages/nash-kolektyv.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Прийом до закладу"
        name: "pryiom"
        file: "pages/pryiom.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Прозорість та відкритість"
        name: "prozorist"
        file: "pages/prozorist.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Якість освіти (ВСЯО)"
        name: "yakist-osvity"
        file: "pages/yakist-osvity.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Для батьків"
        name: "dlia-batkiv"
        file: "pages/dlia-batkiv.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Контакти"
        name: "kontakty"
        file: "pages/kontakty.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Обов'язкова інформація (ст.30)"
        name: "obovyazkova-informatsiia"
        file: "pages/obovyazkova-informatsiia.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }
