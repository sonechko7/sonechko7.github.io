# =============================================================
# Decap CMS — КЗДО №7 «Сонечко»
# =============================================================
# Репозиторій: sonechko7/sonechko7.github.io
# Сайт:        https://sonechko7.github.io
# Адмін-панель: https://sonechko7.github.io/admin/
#
# НАЛАШТУВАННЯ GITHUB OAuth (одноразово):
#
# 1. Зайдіть на https://github.com/settings/developers
#    → OAuth Apps → New OAuth App
#
# 2. Заповніть:
#    Application name:           Sonechko Admin
#    Homepage URL:               https://sonechko7.github.io
#    Authorization callback URL: https://sonechko7.github.io/admin/
#
# 3. Після створення скопіюйте Client ID
#    і вставте його у поле app_id нижче.
#    (Client Secret не потрібен — використовується PKCE)
#
# ДЛЯ ЛОКАЛЬНОЇ РОЗРОБКИ (на своєму комп'ютері):
#    Розкоментуйте рядок: local_backend: true
#    Запустіть в окремому терміналі: npx decap-server
#    Відкрийте: http://localhost:4000/admin/
# =============================================================

backend:
  name: github
  repo: sonechko7/sonechko7.github.io
  branch: main

# local_backend: true   # ← Розкоментуйте для локального тестування

locale: uk

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# =============================================================
# КОЛЕКЦІЇ (що можна редагувати через адмін-панель)
# =============================================================

collections:

  # ------ НОВИНИ ------
  - name: "posts"
    label: "📰 Новини та оголошення"
    label_singular: "Новина"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Заголовок"
        name: "title"
        widget: "string"
        hint: "Коротко та зрозуміло. Наприклад: «Весняне свято у «Сонечку»»"

      - label: "Дата публікації"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        default: ""

      - label: "Категорія"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - { label: "Новини",       value: "новини" }
          - { label: "Оголошення",   value: "оголошення" }
          - { label: "Свята",        value: "свята" }
          - { label: "Заходи",       value: "заходи" }
          - { label: "Фотогалерея", value: "фотогалерея" }

      - label: "Іконка (emoji)"
        name: "icon"
        widget: "string"
        required: false
        default: "📰"
        hint: "Emoji-іконка для картки новини. Наприклад: 🌸 📋 🎉 📸"

      - label: "Головне фото"
        name: "image"
        widget: "image"
        required: false
        hint: "Фото для картки новини (рекомендований розмір: 800×500 px)"

      - label: "Короткий опис (для картки на головній)"
        name: "excerpt"
        widget: "string"
        required: false
        hint: "1–2 речення. Якщо не заповнити — береться початок тексту автоматично"

      - label: "Текст новини"
        name: "body"
        widget: "markdown"

  # ------ ГОЛОВНА СТОРІНКА ------
  - name: "home"
    label: "🏠 Головна сторінка"
    label_singular: "Головна сторінка"
    editor:
      preview: false
    files:
      - label: "Головна сторінка"
        name: "home"
        file: "_data/home.yml"
        fields:
          # --- Банер (верхній блок) ---
          - label: "Фото на головній (банер)"
            name: "hero_image"
            widget: "image"
            hint: "Фото дітей у рамці на головній сторінці (рекомендований розмір: 600×360 px)"

          - label: "Вітальний напис (над назвою)"
            name: "hero_welcome"
            widget: "string"
            hint: "Наприклад: «Ласкаво просимо до»"

          - label: "Назва закладу — основна частина"
            name: "hero_title_main"
            widget: "string"
            hint: "Наприклад: «КЗДО №7»"

          - label: "Назва закладу — виділена частина"
            name: "hero_title_accent"
            widget: "string"
            hint: "Виділяється кольором. Наприклад: «Сонечко»"

          - label: "Гасло (під назвою)"
            name: "hero_tagline"
            widget: "string"
            hint: "Наприклад: «Територія щасливого дитинства»"

          - label: "Кнопка 1 (синя) — текст"
            name: "hero_button_primary_text"
            widget: "string"

          - label: "Кнопка 1 (синя) — посилання"
            name: "hero_button_primary_link"
            widget: "string"
            hint: "Адреса сторінки. Наприклад: /pro-zaklad/"

          - label: "Кнопка 2 (світла) — текст"
            name: "hero_button_secondary_text"
            widget: "string"

          - label: "Кнопка 2 (світла) — посилання"
            name: "hero_button_secondary_link"
            widget: "string"
            hint: "Адреса сторінки. Наприклад: /pryiom/"

          # --- Переваги (4 блоки) ---
          - label: "Переваги (4 блоки)"
            name: "features"
            widget: "list"
            max: 4
            min: 4
            label_singular: "Перевага"
            summary: "{{fields.label}}"
            fields:
              - { label: "Іконка (emoji)", name: "icon", widget: "string", hint: "Наприклад: 🛡️ 📚 💛 🌱" }
              - { label: "Підпис", name: "label", widget: "text", hint: "Можна у два рядки — натисніть Enter для переносу" }

          # --- Блок новин ---
          - label: "Заголовок новин — основна частина"
            name: "news_title_main"
            widget: "string"
            hint: "Наприклад: «Останні»"

          - label: "Заголовок новин — виділена частина"
            name: "news_title_accent"
            widget: "string"
            hint: "Виділяється кольором. Наприклад: «новини»"

          - label: "Текст кнопки «Всі новини»"
            name: "news_all_text"
            widget: "string"
            hint: "Стрілку → додавати не потрібно"

          - label: "Напис, коли новин ще немає"
            name: "news_empty_text"
            widget: "string"
            hint: "Показується, якщо жодної новини ще не опубліковано"

          # --- Нижній інфо-блок ---
          - label: "Режим роботи"
            name: "working_hours"
            widget: "string"
            hint: "Наприклад: «Пн–Пт: 07:00–18:00»"

  # ------ КОНТАКТИ ТА РЕКВІЗИТИ ------
  - name: "settings"
    label: "⚙️ Контакти та реквізити"
    label_singular: "Контакти та реквізити"
    editor:
      preview: false
    files:
      - label: "Контакти та реквізити"
        name: "contacts"
        file: "_data/contacts.yml"
        fields:
          - label: "Адреса"
            name: "address"
            widget: "string"
            hint: "Показується у шапці, підвалі та на головній"
          - label: "Телефон"
            name: "phone"
            widget: "string"
            hint: "Наприклад: (04740) 6-12-52"
          - label: "Електронна пошта"
            name: "email"
            widget: "string"
          - label: "Кількість груп"
            name: "groups"
            widget: "number"
            value_type: "int"
            min: 0
          - label: "Кількість вихованців"
            name: "pupils"
            widget: "number"
            value_type: "int"
            min: 0

  # ------ НАШ КОЛЕКТИВ ------
  - name: "team"
    label: "👥 Наш колектив"
    label_singular: "Наш колектив"
    editor:
      preview: false
    files:
      - label: "Працівники закладу"
        name: "team"
        file: "_data/team.yml"
        fields:
          - label: "Адміністрація"
            name: "administration"
            widget: "list"
            label_singular: "Працівник"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "ПІБ", name: "name", widget: "string" }
              - { label: "Посада", name: "role", widget: "string" }
              - { label: "Телефон", name: "phone", widget: "string", required: false }
              - { label: "Фото", name: "photo", widget: "image", required: false, hint: "Портрет (рекомендоване співвідношення 4:5, напр. 300×375 px). Якщо не додати — буде показано першу літеру імені" }

          - label: "Педагогічний колектив"
            name: "teachers"
            widget: "list"
            label_singular: "Вихователь"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "ПІБ", name: "name", widget: "string" }
              - { label: "Група", name: "role", widget: "string" }
              - { label: "Фото", name: "photo", widget: "image", required: false, hint: "Необов'язково. Якщо не додати — буде показано першу літеру імені" }

          - label: "Спеціалісти"
            name: "specialists"
            widget: "list"
            label_singular: "Спеціаліст"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "ПІБ", name: "name", widget: "string" }
              - { label: "Спеціальність", name: "role", widget: "string" }
              - { label: "Фото", name: "photo", widget: "image", required: false, hint: "Необов'язково. Якщо не додати — буде показано першу літеру імені" }

          - label: "Підвищення кваліфікації — текст"
            name: "development_text"
            widget: "text"

          - label: "Підвищення кваліфікації — фото/сертифікати"
            name: "development_photos"
            widget: "list"
            label_singular: "Фото"
            field: { label: "Зображення", name: "image", widget: "image" }

  # ------ СТОРІНКИ ------
  - name: "pages"
    label: "📄 Сторінки сайту"
    label_singular: "Сторінка"
    editor:
      preview: false
    files:

      - label: "Про заклад"
        name: "pro-zaklad"
        file: "pages/pro-zaklad.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Освітній процес"
        name: "osvitny-protses"
        file: "pages/osvitny-protses.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Наш колектив (заголовок та опис)"
        name: "nash-kolektyv"
        file: "pages/nash-kolektyv.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "kolektyv" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/nash-kolektyv/" }
        hint: "Список працівників редагується в розділі «👥 Наш колектив»"

      - label: "Прийом до закладу"
        name: "pryiom"
        file: "pages/pryiom.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Прозорість та відкритість"
        name: "prozorist"
        file: "pages/prozorist.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Якість освіти (ВСЯО)"
        name: "yakist-osvity"
        file: "pages/yakist-osvity.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Для батьків"
        name: "dlia-batkiv"
        file: "pages/dlia-batkiv.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Контакти"
        name: "kontakty"
        file: "pages/kontakty.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }

      - label: "Обов'язкова інформація (ст.30)"
        name: "obovyazkova-informatsiia"
        file: "pages/obovyazkova-informatsiia.md"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Опис (SEO)", name: "description", widget: "string" }
          - { label: "Вміст сторінки", name: "body", widget: "markdown" }
